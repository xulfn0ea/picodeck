name: build

on:
  pull_request:
  push:
  release:
    types:
      - created
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        hardware:
          - 'adapedal'
          - 'keybow'
          - 'pico2'

    steps:
      - name: Install GNU Arm Embedded Toolchain (arm-none-eabi-gcc)
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '11.2-2022.02'

      - uses: actions/checkout@v3

      - name: Checkout sdk
        run: git submodule update --init pico-sdk

      - name: Update pico-sdk to 2.1.1 for Pico 2 support
        if: matrix.hardware == 'pico2'
        working-directory: ${{github.workspace}}/pico-sdk
        run: |
          git fetch origin
          git checkout 2.1.1

      - name: Checkout pico-sdk submodules
        working-directory: ${{github.workspace}}/pico-sdk
        run: git submodule update --init

      - run: mkdir ${{github.workspace}}/build

      - name: Configure CMake
        shell: bash
        working-directory: ${{github.workspace}}/build
        run: |
          if [ "${{ matrix.hardware }}" = "pico2" ]; then
            cmake .. -DPICO_BOARD=pico2
          else
            cmake ..
          fi

      - name: Get core count
        id: core_count
        run: cat /proc/cpuinfo | grep processor | wc -l

      - name: Build
        working-directory: ${{github.workspace}}/build
        shell: bash
        run: cmake --build . --parallel ${{steps.core_count.outputs.output}}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.hardware }}.uf2
          path: ${{github.workspace}}/build/*.uf2
